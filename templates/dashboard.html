<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard | Waste Tracking</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">♻️ WasteTrack</div>
      <nav class="main-nav">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('dashboard') }}" class="active">Dashboard</a>
        <a href="{{ url_for('track') }}">Track</a>
        <a href="{{ url_for('report') }}">Report</a>
        <a href="{{ url_for('about') }}">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Dashboard Overview</h1>

    <section class="stats-grid" id="statsGrid">
      <!-- cards filled by JS -->
    </section>

    <section class="chart-panel">
      <h2>Waste by Type</h2>
      <canvas id="typeChart" height="120"></canvas>
      <div class="chart-actions">
        <button id="refreshBtn" class="btn">Refresh</button>
        <button id="downloadCsvBtn" class="btn secondary">Download Reports CSV</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2025 Digital Waste Tracking System</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    // Dashboard-specific startup
    async function initDashboard(){
      await window.loadStatsAndChart();
    }
    document.addEventListener('DOMContentLoaded', initDashboard);
  </script>
</body>
</html>
