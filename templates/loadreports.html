<!DOCTYPE html>
<html>
<head>
  <title>All Reports</title>
</head>
<body>

<h2>All Waste Reports</h2>
<div id="list"></div>

<script>
async function load(){
  const res = await fetch('/api/reports');
  const data = await res.json();

  let html = '';

  data.forEach(r => {
    html += `
      <div style="border:1px solid #ccc; margin:10px; padding:10px;">
        <b>${r.type}</b><br>
        Location: ${r.location}<br>
        Weight: ${r.weight} kg<br>
        ${r.photo ? `<img src="/static/uploads/${r.photo}" width="150">` : ''}
      </div>
    `;
  });

  document.getElementById('list').innerHTML = html;
}

load();
</script>

</body>
</html>
