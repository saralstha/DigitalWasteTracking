<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reported Waste</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container" style="padding:40px 20px;">
    <h1>Reported Waste</h1>
    <p><a href="{{ url_for('home') }}">Back to Home</a></p>
    <div id="reportsContainer"></div>
  </div>

  <script>
    async function loadAllReports() {
      const res = await fetch('/api/reports');
      const reports = await res.json();
      const container = document.getElementById('reportsContainer');

      if (!reports.length) {
        container.innerHTML = '<p>No reports yet.</p>';
        return;
      }

      container.innerHTML = reports.map(r => `
        <div style="background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;margin-bottom:16px;">
          <h3>${r.type || 'Unknown'} Waste</h3>
          <p><strong>Location:</strong> ${r.location || ''}</p>
          <p><strong>Weight:</strong> ${r.weight || ''} kg</p>
          ${r.photo ? `<img src="/uploads/${encodeURIComponent(r.photo)}" width="180" style="border-radius:8px;">` : ''}
        </div>
      `).join('');
    }

    loadAllReports();
  </script>
</body>
</html>
